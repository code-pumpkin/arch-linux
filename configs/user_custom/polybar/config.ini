;==========================================================
;   Polybar — compact icon tray style
;==========================================================

[colors]
background = #CC11111B
background-alt = #1E1E2E
foreground = #CDD6F4
primary = #CDD6F4
secondary = #94E2D5
alert = #F38BA8
disabled = #585B70
accent = #89B4FA

[bar/example]
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 0
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 0

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Font Awesome 7 Free:style=Solid:size=12;3
font-2 = Font Awesome 7 Brands:size=12;3
font-3 = Symbols Nerd Font:size=12;3
font-4 = Noto Color Emoji:size=11;3

modules-left = xworkspaces xwindow
modules-center = privacy date timezones
modules-right = cpu memory temps volume brightness xkeyboard network battery systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 6pt
tray-spacing = 10pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.accent}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = "  %title:0:50:...%"
label-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = "  %date%  "
label-foreground = ${colors.foreground}

[module/privacy]
type = custom/script
exec = ~/.config/polybar/privacy-monitor.sh
interval = 2
click-left = ~/.config/polybar/privacy-monitor.sh menu
click-middle = ~/.config/polybar/privacy-monitor.sh toggle-mic
click-right = ~/.config/polybar/privacy-monitor.sh notify
tail = false
label = "%output%  "
label-foreground = ${colors.primary}

[module/timezones]
type = custom/script
exec = ~/.config/polybar/timezones.sh
interval = 10
click-left = ~/.config/polybar/timezones.sh menu
click-right = ~/.config/polybar/timezones.sh notify
tail = false
label = "  %output%"
label-foreground = ${colors.disabled}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.disabled}
label = "%percentage:2%%  "
label-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.disabled}
label = "%percentage_used:2%%  "
label-foreground = ${colors.primary}

[module/temps]
type = custom/script
exec = ~/.config/polybar/temps.sh
interval = 5
click-left = ~/.config/polybar/temps.sh notify
tail = false
label = "  %output%°C  "
label-foreground = ${colors.primary}

[module/volume]
type = custom/script
exec = ~/.config/polybar/volume.sh
interval = 1
click-left = ~/.config/polybar/volume.sh mute
click-right = ~/.config/polybar/volume.sh menu
scroll-up = ~/.config/polybar/volume.sh up
scroll-down = ~/.config/polybar/volume.sh down
tail = false
label = "  %output%  "
label-foreground = ${colors.primary}

[module/brightness]
type = custom/script
exec = ~/.config/polybar/brightness.sh
interval = 1
scroll-up = ~/.config/polybar/brightness.sh up
scroll-down = ~/.config/polybar/brightness.sh down
click-left = ~/.config/polybar/brightness.sh menu
tail = false
label = "  %output%  "
label-foreground = ${colors.primary}

[module/xkeyboard]
type = custom/script
exec = ~/.config/polybar/keyboard.sh
interval = 1
click-left = ~/.config/polybar/keyboard.sh select
tail = false
label = "  %output%  "
label-foreground = ${colors.primary}

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 5
click-left = ~/.config/polybar/network.sh menu
tail = false
label = "  %output%  "
label-foreground = ${colors.primary}

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 10
click-right = ~/.config/polybar/battery.sh menu
tail = false
label = "  %output%  "
label-foreground = ${colors.primary}

[module/storage]
type = custom/script
exec = ~/.config/polybar/storage.sh
interval = 30
tail = false
label = "  %output%  "
label-foreground = ${colors.disabled}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
