;==========================================================
;   Polybar — Nord-Frost palette (grayscale-safe)
;==========================================================

[colors]
background = #11111B
background-alt = #1E1E2E
foreground = #B8C0D9
primary = #B8C0D9
secondary = #94E2D5
alert = #F38BA8
disabled = #585B70

[bar/example]
width = 100%
height = 30pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator =
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Font Awesome 7 Free:style=Solid:size=11;3
font-2 = Font Awesome 7 Brands:size=11;3
font-3 = Symbols Nerd Font:size=11;3
font-4 = Noto Color Emoji:size=11;3

modules-left = xworkspaces xwindow
modules-center = privacy
modules-right = volume brightness xkeyboard battery temps cpu memory storage network timezones

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = App:%instance% %title:0:60:...%

[module/volume]
type = custom/script
exec = ~/.config/polybar/volume.sh
interval = 1
click-left = ~/.config/polybar/volume.sh mute
click-right = ~/.config/polybar/volume.sh mute
scroll-up = ~/.config/polybar/volume.sh up
scroll-down = ~/.config/polybar/volume.sh down
tail = false

label = %output%
label-foreground = ${colors.primary}
label-click-foreground = ${colors.secondary}

[module/brightness]
type = custom/script
exec = ~/.config/polybar/brightness.sh
interval = 1
scroll-up = ~/.config/polybar/brightness.sh up
scroll-down = ~/.config/polybar/brightness.sh down
click-left = ~/.config/polybar/brightness.sh menu
tail = false

label = %output%
label-foreground = ${colors.primary}
label-click-foreground = ${colors.secondary}

[module/xkeyboard]
type = custom/script
exec = ~/.config/polybar/keyboard.sh
interval = 1
click-left = ~/.config/polybar/keyboard.sh select
tail = false

label = %output%
label-foreground = ${colors.primary}
label-click-foreground = ${colors.secondary}


[module/memory]
type = internal/memory
interval = 2
format-prefix = "%{T2} %{T-}"
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/storage]
type = custom/script
exec = ~/.config/polybar/storage.sh
interval = 30
click-left = ~/.config/polybar/storage.sh notify
tail = false

label = %output%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{T2} %{T-}"
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 5
click-left = ~/.config/polybar/network.sh menu
tail = false

label = %output%
label-foreground = ${colors.primary}
label-click-foreground = ${colors.secondary}

[module/timezones]
type = custom/script
exec = ~/.config/polybar/timezones.sh
interval = 10
click-left = ~/.config/polybar/timezones.sh menu
click-right = ~/.config/polybar/timezones.sh notify
tail = false

label = %output%
label-foreground = ${colors.primary}
label-click-foreground = ${colors.secondary}

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 10
tail = false

label = %output%
label-foreground = ${colors.primary}

[module/temps]
type = custom/script
exec = ~/.config/polybar/temps.sh
interval = 5
click-left = ~/.config/polybar/temps.sh notify
tail = false

label = %output%°C
label-foreground = ${colors.primary}
label-click-foreground = ${colors.secondary}

[module/privacy]
type = custom/script
exec = ~/.config/polybar/privacy-monitor.sh
interval = 2
click-left = ~/.config/polybar/privacy-monitor.sh menu
click-middle = ~/.config/polybar/privacy-monitor.sh toggle-mic
click-right = ~/.config/polybar/privacy-monitor.sh notify
tail = false

label = %output%
label-foreground = ${colors.primary}

; vim:ft=dosini

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d
time = %H:%M:%S

label = %date% %time%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
