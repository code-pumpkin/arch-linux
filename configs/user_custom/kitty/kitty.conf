# Font — Nerd Font for icons + ligatures
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0
disable_ligatures never

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Window
remember_window_size  yes
initial_window_width  120c
initial_window_height 36c
window_padding_width 8
placement_strategy center
hide_window_decorations yes
confirm_os_window_close 0

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold

# Bell
enable_audio_bell no
visual_bell_duration 0

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask
alt_send_esc yes

# --- Color scheme (deep navy + soft blue) ---
foreground              #CDD6F4
background              #11111B
selection_foreground     #11111B
selection_background     #89B4FA
cursor                  #89B4FA
cursor_text_color       #11111B
url_color               #94E2D5

# Black
color0  #1E1E2E
color8  #585B70
# Red
color1  #F38BA8
color9  #F38BA8
# Green
color2  #A6E3A1
color10 #A6E3A1
# Yellow
color3  #F9E2AF
color11 #F9E2AF
# Blue
color4  #89B4FA
color12 #89B4FA
# Magenta
color5  #CBA6F7
color13 #CBA6F7
# Cyan
color6  #94E2D5
color14 #94E2D5
# White
color7  #BAC2DE
