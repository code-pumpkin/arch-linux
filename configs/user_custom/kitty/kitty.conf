# Font — Nerd Font for icons + ligatures
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0

disable_ligatures never
disable_ligatures never
disable_ligatures never

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Window
remember_window_size  yes
initial_window_width  120c
initial_window_height 36c
window_padding_width 8
placement_strategy center
hide_window_decorations yes
confirm_os_window_close 0

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold

# Bell
enable_audio_bell no
visual_bell_duration 0

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask
alt_send_esc yes

# --- Color scheme ---
foreground              #C8CBCD
background              #000000
selection_foreground     #000000
selection_background     #BEC9C6
cursor                  #BEC9C6
cursor_text_color       #000000
url_color               #8FB5A4

# Black
color0  #000000
color8  #5A5E62
# Red
color1  #CC6666
color9  #CC6666
# Green
color2  #7A9E8E
color10 #8FB5A4
# Yellow
color3  #C4A882
color11 #D4BC96
# Blue slot — replaced with sage green (no blue)
color4  #7A9E8E
color12 #8FB5A4
# Magenta
color5  #A899B8
color13 #B8ADCC
# Cyan
color6  #8FB5A4
color14 #9EC4B3
# White
color7  #BEC9C6
color15 #C8CBCD

# Tab bar colors
active_tab_foreground   #000000
active_tab_background   #BEC9C6
inactive_tab_foreground #5A5E62
inactive_tab_background #0a0a0a

# Background opacity
background_opacity 1.0
