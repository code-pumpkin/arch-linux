<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Arabic: Noto Naskh Arabic -->
  <match>
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Naskh Arabic</string></edit>
  </match>
  <match>
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Naskh Arabic</string></edit>
  </match>
  <match>
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Arabic</string></edit>
  </match>

  <!-- French: Noto Serif -->
  <match>
    <test name="lang" compare="contains"><string>fr</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif</string></edit>
  </match>
  <match>
    <test name="lang" compare="contains"><string>fr</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif</string></edit>
  </match>
</fontconfig>
