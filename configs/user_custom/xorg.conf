# xorg.conf template for eGPU setup
# __INTEL_BUSID__ is substituted at install time
# __NVIDIA_BUSID__ is substituted at boot by nvidia-egpu-setup.sh

Section "ServerLayout"
    Identifier     "Layout0"
    Screen      0  "Screen0" 0 0
    InputDevice    "Keyboard0" "CoreKeyboard"
    InputDevice    "Mouse0" "CorePointer"
    Option         "AllowNVIDIAGPUScreens" "true"
EndSection

Section "ServerLayout"
    Identifier     "InternalOnly"
    Screen      0  "Screen1" 0 0
    InputDevice    "Keyboard0" "CoreKeyboard"
    InputDevice    "Mouse0" "CorePointer"
EndSection

Section "InputDevice"
    Identifier     "Mouse0"
    Driver         "mouse"
    Option         "Protocol" "auto"
    Option         "Device" "/dev/psaux"
    Option         "Emulate3Buttons" "no"
    Option         "ZAxisMapping" "4 5"
EndSection

Section "InputDevice"
    Identifier     "Keyboard0"
    Driver         "kbd"
EndSection

Section "Monitor"
    Identifier     "Monitor1"
    Option         "PreferredMode" "1920x1080"
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "nvidia"
    BusID          "__NVIDIA_BUSID__"
EndSection

Section "Device"
    Identifier     "Device1"
    Driver         "modesetting"
    BusID          "__INTEL_BUSID__"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor1"
    DefaultDepth    24
    Option         "AllowEmptyInitialConfiguration" "True"
    Option         "AllowExternalGpus" "true"
    SubSection     "Display"
        Depth       24
        Modes      "nvidia-auto-select"
    EndSubSection
EndSection

Section "Screen"
    Identifier     "Screen1"
    Device         "Device1"
    Monitor        "Monitor1"
    DefaultDepth    24
EndSection
