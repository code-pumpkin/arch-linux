[bar/main]
width = 100%
height = 28
background = #2e3440
foreground = #d8dee9
font-0 = DejaVu Sans:size=10;3
modules-left = i3
modules-center = date
modules-right = pulseaudio battery

[module/i3]
type = internal/i3
pin-workspaces = true
label-focused = %index%
label-focused-background = #5e81ac
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-padding = 2

[module/date]
type = internal/date
interval = 30
date = %a %b %d
time = %H:%M
label = %date%  %time%

[module/pulseaudio]
type = internal/pulseaudio
label-volume = VOL %percentage%%
label-muted = MUTED
label-volume-padding = 2
label-muted-padding = 2

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
label-charging = CHG %percentage%%
label-discharging = BAT %percentage%%
label-full = FULL
label-charging-padding = 2
label-discharging-padding = 2
label-full-padding = 2
