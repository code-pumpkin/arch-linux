[general]
import = ["~/.config/alacritty/colors.toml"]

[window]
padding = { x = 8, y = 8 }
opacity = 0.95

[font]
normal = { family = "DejaVu Sans Mono", style = "Regular" }
size = 11.0

[colors.primary]
background = "#2e3440"
foreground = "#d8dee9"

[colors.normal]
black   = "#3b4252"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#88c0d0"
white   = "#e5e9f0"
